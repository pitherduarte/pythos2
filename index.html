<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Pythos — Plataforma de Estudos</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;0,800;0,900;1,500&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    font-family: Inter, sans-serif;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }
  #root { min-height: 100%; width: 100%; }
  button { font-family: inherit; cursor: pointer; }
  input { font-family: inherit; }

  @keyframes pyfade { from { opacity: 0; transform: translateY(9px); } to { opacity: 1; transform: none; } }
  @keyframes pysheet { from { transform: translateY(100%); } to { transform: none; } }

  /* Hide scrollbar for WebKit */
  .py-scroll::-webkit-scrollbar { width: 5px; }
  .py-scroll::-webkit-scrollbar-track { background: transparent; }
  .py-scroll::-webkit-scrollbar-thumb { background: rgba(128,128,128,0.25); border-radius: 10px; }
  .py-scroll::-webkit-scrollbar-thumb:hover { background: rgba(128,128,128,0.4); }

  /* Responsive helpers */
  .mobile-only { display: flex !important; }
  .desktop-only { display: none !important; }

  @media (min-width: 768px) {
    .mobile-only { display: none !important; }
    .desktop-only { display: flex !important; }
  }

  /* Touch feedback */
  @media (hover: hover) {
    .py-hover:hover { filter: brightness(1.06); }
  }


  /* Selection color */
  ::selection { background: rgba(30,64,255,0.3); }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

// ═══════════════════════════════════════════════════
// 1. ICON COMPONENTS (Ic object)
// ═══════════════════════════════════════════════════
const Ic = {
  home: (p) => (
    <svg viewBox="0 0 24 24" fill="none" width={p.s||24} height={p.s||24} stroke="currentColor" strokeWidth={p.w||1.8} strokeLinecap="round" strokeLinejoin="round">
      <path d="M3 10.5 12 3l9 7.5"/><path d="M5 9.5V20h14V9.5"/>
    </svg>
  ),
  chart: (p) => (
    <svg viewBox="0 0 24 24" fill="none" width={p.s||24} height={p.s||24} stroke="currentColor" strokeWidth={p.w||1.8} strokeLinecap="round" strokeLinejoin="round">
      <path d="M5 20V11"/><path d="M12 20V4"/><path d="M19 20v-6"/>
    </svg>
  ),
  gear: (p) => (
    <svg viewBox="0 0 24 24" fill="none" width={p.s||24} height={p.s||24} stroke="currentColor" strokeWidth={p.w||1.8} strokeLinecap="round" strokeLinejoin="round">
      <circle cx="12" cy="12" r="3"/>
      <path d="M12 2v2M12 20v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M2 12h2M20 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
    </svg>
  ),
  back: (p) => (
    <svg viewBox="0 0 24 24" fill="none" width={p.s||24} height={p.s||24} stroke="currentColor" strokeWidth={p.w||1.9} strokeLinecap="round" strokeLinejoin="round">
      <path d="M15 5l-7 7 7 7"/>
    </svg>
  ),
  chevR: (p) => (
    <svg viewBox="0 0 24 24" fill="none" width={p.s||20} height={p.s||20} stroke="currentColor" strokeWidth={p.w||1.8} strokeLinecap="round" strokeLinejoin="round">
      <path d="M9 5l7 7-7 7"/>
    </svg>
  ),
  chevD: (p) => (
    <svg viewBox="0 0 24 24" fill="none" width={p.s||20} height={p.s||20} stroke="currentColor" strokeWidth={p.w||1.8} strokeLinecap="round" strokeLinejoin="round">
      <path d="M5 9l7 7 7-7"/>
    </svg>
  ),
  lock: (p) => (
    <svg viewBox="0 0 24 24" fill="none" width={p.s||18} height={p.s||18} stroke="currentColor" strokeWidth={p.w||1.8} strokeLinecap="round" strokeLinejoin="round">
      <rect x="5" y="10.5" width="14" height="9.5" rx="2.2"/><path d="M8 10.5V8a4 4 0 0 1 8 0v2.5"/>
    </svg>
  ),
  check: (p) => (
    <svg viewBox="0 0 24 24" fill="none" width={p.s||18} height={p.s||18} stroke="currentColor" strokeWidth={p.w||2.4} strokeLinecap="round" strokeLinejoin="round">
      <path d="M4 12.5l5 5 11-11"/>
    </svg>
  ),
  user: (p) => (
    <svg viewBox="0 0 24 24" fill="none" width={p.s||22} height={p.s||22} stroke="currentColor" strokeWidth={p.w||1.8} strokeLinecap="round" strokeLinejoin="round">
      <circle cx="12" cy="8.5" r="3.7"/><path d="M4.5 20c1.2-3.8 4-5.6 7.5-5.6s6.3 1.8 7.5 5.6"/>
    </svg>
  ),
  bell: (p) => (
    <svg viewBox="0 0 24 24" fill="none" width={p.s||20} height={p.s||20} stroke="currentColor" strokeWidth={p.w||1.8} strokeLinecap="round" strokeLinejoin="round">
      <path d="M6 9a6 6 0 0 1 12 0c0 5 2 6 2 6H4s2-1 2-6"/><path d="M10 20a2 2 0 0 0 4 0"/>
    </svg>
  ),
  moon: (p) => (
    <svg viewBox="0 0 24 24" fill="none" width={p.s||20} height={p.s||20} stroke="currentColor" strokeWidth={p.w||1.8} strokeLinecap="round" strokeLinejoin="round">
      <path d="M20 14.5A8 8 0 0 1 9.5 4 7 7 0 1 0 20 14.5Z"/>
    </svg>
  ),
  globe: (p) => (
    <svg viewBox="0 0 24 24" fill="none" width={p.s||20} height={p.s||20} stroke="currentColor" strokeWidth={p.w||1.8} strokeLinecap="round" strokeLinejoin="round">
      <circle cx="12" cy="12" r="8.5"/><path d="M3.5 12h17M12 3.5c2.5 2.5 2.5 14.5 0 17M12 3.5c-2.5 2.5-2.5 14.5 0 17"/>
    </svg>
  ),
  sound: (p) => (
    <svg viewBox="0 0 24 24" fill="none" width={p.s||20} height={p.s||20} stroke="currentColor" strokeWidth={p.w||1.8} strokeLinecap="round" strokeLinejoin="round">
      <path d="M5 9.5h3.5L13 6v12l-4.5-3.5H5z"/><path d="M16.5 9a4 4 0 0 1 0 6"/>
    </svg>
  ),
  key: (p) => (
    <svg viewBox="0 0 24 24" fill="none" width={p.s||20} height={p.s||20} stroke="currentColor" strokeWidth={p.w||1.8} strokeLinecap="round" strokeLinejoin="round">
      <circle cx="8" cy="8" r="4"/><path d="M11 11l8 8M16 16l2-2M18.5 18.5l1.5-1.5"/>
    </svg>
  ),
  shield: (p) => (
    <svg viewBox="0 0 24 24" fill="none" width={p.s||20} height={p.s||20} stroke="currentColor" strokeWidth={p.w||1.8} strokeLinecap="round" strokeLinejoin="round">
      <path d="M12 3l7 3v5c0 4.5-3 8-7 10-4-2-7-5.5-7-10V6z"/>
    </svg>
  ),
  download: (p) => (
    <svg viewBox="0 0 24 24" fill="none" width={p.s||20} height={p.s||20} stroke="currentColor" strokeWidth={p.w||1.8} strokeLinecap="round" strokeLinejoin="round">
      <path d="M12 4v11M7.5 10.5 12 15l4.5-4.5M5 19.5h14"/>
    </svg>
  ),
  logout: (p) => (
    <svg viewBox="0 0 24 24" fill="none" width={p.s||20} height={p.s||20} stroke="currentColor" strokeWidth={p.w||1.8} strokeLinecap="round" strokeLinejoin="round">
      <path d="M14 4H6v16h8M10 12h10M16.5 8.5 20 12l-3.5 3.5"/>
    </svg>
  ),
  flame: (p) => (
    <svg viewBox="0 0 24 24" fill="none" width={p.s||20} height={p.s||20} stroke="currentColor" strokeWidth={p.w||1.7} strokeLinecap="round" strokeLinejoin="round">
      <path d="M12 3c.5 3-2 4-2 7a2 2 0 0 0 4 0c2 1.5 3 3.2 3 5.5A5.5 5.5 0 0 1 6.5 15c0-3 2-4.5 2.5-7 1.5 1 3 .5 3-5z"/>
    </svg>
  ),
  bolt: (p) => (
    <svg viewBox="0 0 24 24" fill="none" width={p.s||20} height={p.s||20} stroke="currentColor" strokeWidth={p.w||1.7} strokeLinecap="round" strokeLinejoin="round">
      <path d="M13 3 5 13h6l-1 8 8-10h-6z"/>
    </svg>
  ),
  target: (p) => (
    <svg viewBox="0 0 24 24" fill="none" width={p.s||20} height={p.s||20} stroke="currentColor" strokeWidth={p.w||1.7} strokeLinecap="round" strokeLinejoin="round">
      <circle cx="12" cy="12" r="8.5"/><circle cx="12" cy="12" r="4.5"/><circle cx="12" cy="12" r="1" fill="currentColor"/>
    </svg>
  ),
  trophy: (p) => (
    <svg viewBox="0 0 24 24" fill="none" width={p.s||20} height={p.s||20} stroke="currentColor" strokeWidth={p.w||1.7} strokeLinecap="round" strokeLinejoin="round">
      <path d="M7 4h10v4a5 5 0 0 1-10 0z"/><path d="M7 5H4v2a3 3 0 0 0 3 3M17 5h3v2a3 3 0 0 1-3 3M10 14h4M9.5 20h5M12 14v6"/>
    </svg>
  ),
};

// ═══════════════════════════════════════════════════
// 2. HELPERS
// ═══════════════════════════════════════════════════
function ProgressBar({ value, color, track, h = 6 }) {
  return (
    <div style={{ width: '100%', height: h, borderRadius: h, background: track || 'rgba(0,0,0,0.18)', overflow: 'hidden' }}>
      <div style={{ width: `${value}%`, height: '100%', borderRadius: h, background: color, transition: 'width .3s ease' }} />
    </div>
  );
}

function Ring({ value, size = 34, stroke = 3.5, color, track }) {
  const r = (size - stroke) / 2;
  const c = 2 * Math.PI * r;
  return (
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`} style={{ transform: 'rotate(-90deg)' }}>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={track||'rgba(255,255,255,0.1)'} strokeWidth={stroke} />
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={stroke}
        strokeDasharray={c} strokeDashoffset={c*(1-value/100)} strokeLinecap="round" />
    </svg>
  );
}

function Chip({ children, bg, color, border }) {
  return (
    <span style={{
      display: 'inline-flex', alignItems: 'center', gap: 6, height: 28, padding: '0 12px',
      borderRadius: 999, background: bg, color, border: border || 'none',
      fontFamily: 'Inter, sans-serif', fontSize: 12.5, fontWeight: 600, whiteSpace: 'nowrap',
    }}>{children}</span>
  );
}

function Label({ children }) {
  return <div style={{ fontFamily: 'Inter, sans-serif', fontSize: 12, fontWeight: 600, letterSpacing: '0.07em', textTransform: 'uppercase', color: 'var(--text-muted)', margin: '0 4px 12px' }}>{children}</div>;
}

function Group({ children }) {
  return <div style={{ background: 'var(--surface)', border: '1px solid var(--border)', borderRadius: 16, overflow: 'hidden' }}>{children}</div>;
}

function Toggle({ on }) {
  return (
    <div style={{
      width: 46, height: 28, borderRadius: 999, flex: '0 0 auto', position: 'relative',
      background: on ? 'var(--accent)' : 'var(--surface-2)', transition: 'background .2s',
    }}>
      <div style={{
        position: 'absolute', top: 3, left: on ? 21 : 3, width: 22, height: 22, borderRadius: '50%',
        background: '#fff', boxShadow: '0 1px 3px rgba(0,0,0,0.3)', transition: 'left .2s',
      }} />
    </div>
  );
}

const STATUS = {
  done: { label: 'Concluído', bg: 'rgba(78,203,113,0.16)', color: '#5fd389' },
  prog: { label: 'Em progresso', bg: 'color-mix(in srgb, var(--accent) 20%, transparent)', color: 'var(--accent-soft)' },
  new: { label: 'Não iniciado', bg: 'var(--surface-2)', color: 'var(--text-muted)' },
};

function StatusBadge({ kind }) {
  const s = STATUS[kind];
  return (
    <span style={{
      padding: '5px 10px', borderRadius: 8, background: s.bg, color: s.color,
      fontFamily: 'Inter, sans-serif', fontSize: 11, fontWeight: 600, whiteSpace: 'nowrap',
    }}>{s.label}</span>
  );
}

function Metric({ icon: Icon, value, label }) {
  return (
    <div style={{
      flex: 1, background: 'var(--surface)', border: '1px solid var(--border)', borderRadius: 16,
      padding: '13px 12px', display: 'flex', flexDirection: 'column', gap: 6,
    }}>
      <span style={{ color: 'var(--accent-soft)', display: 'flex' }}><Icon s={19} /></span>
      <span style={{ fontFamily: 'var(--font-display)', fontWeight: 700, fontSize: 25, color: 'var(--text)', lineHeight: 1 }}>{value}</span>
      <span style={{ fontFamily: 'Inter, sans-serif', fontSize: 11.5, color: 'var(--text-muted)' }}>{label}</span>
    </div>
  );
}

function SubjProgress({ name, pct, color }) {
  return (
    <div style={{ display: 'flex', alignItems: 'center', gap: 14 }}>
      <span style={{ width: 104, flex: '0 0 auto', fontFamily: 'var(--font-display)', fontWeight: 600, fontSize: 16, color: 'var(--text)' }}>{name}</span>
      <div style={{ flex: 1 }}><ProgressBar value={pct} color={color} track="var(--surface-2)" h={9} /></div>
      <span style={{ width: 34, textAlign: 'right', fontFamily: 'Inter, sans-serif', fontSize: 13, fontWeight: 700, color: 'var(--text-muted)' }}>{pct}%</span>
    </div>
  );
}

function Badge({ icon: Icon, locked }) {
  return (
    <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 6 }}>
      <div style={{
        width: 54, height: 54, borderRadius: '50%', display: 'flex', alignItems: 'center', justifyContent: 'center',
        background: locked ? 'var(--surface)' : 'color-mix(in srgb, var(--accent) 18%, var(--surface))',
        border: locked ? '1px solid var(--border)' : '1.5px solid var(--accent)',
        color: locked ? 'var(--text-muted)' : 'var(--accent-soft)', opacity: locked ? 0.5 : 1,
      }}>{locked ? <Ic.lock s={20} /> : <Icon s={24} />}</div>
    </div>
  );
}

function SetRow({ icon: Icon, label, toggle, value, danger, last }) {
  const col = danger ? '#ff5a52' : 'var(--text)';
  return (
    <div style={{
      display: 'flex', alignItems: 'center', gap: 14, padding: '0 16px', height: 54,
      borderBottom: last ? 'none' : '1px solid var(--border)',
    }}>
      <span style={{ color: danger ? '#ff5a52' : 'var(--text-muted)', display: 'flex', flex: '0 0 auto' }}><Icon s={20} /></span>
      <span style={{ flex: 1, fontFamily: 'Inter, sans-serif', fontSize: 15, fontWeight: 500, color: col }}>{label}</span>
      {toggle !== undefined && <Toggle on={toggle} />}
      {value !== undefined && <span style={{ fontFamily: 'Inter, sans-serif', fontSize: 14, color: 'var(--text-muted)' }}>{value}</span>}
      {toggle === undefined && !danger && <span style={{ color: 'var(--text-muted)', display: 'flex' }}><Ic.chevR s={18} /></span>}
    </div>
  );
}

// ═══════════════════════════════════════════════════
// 3. SYM_COLOR + AbstractMark + Sym
// ═══════════════════════════════════════════════════
const SYM_COLOR = {
  sinais:'#E05C2A', fracoes:'#D98C1F', potencias:'#8B3FD9', expressoes:'#1FA7C9', notaveis:'#E0517D',
  fatoracao:'#1FAA6B', equacoes:'#2B5CE6', inequacoes:'#C07A1E', polinomiais:'#5A6FD9', explog:'#D93F7A',
  funcoes:'#2B5CE6', trig:'#E68A2B', geoanalit:'#1FB07E', limites:'#7A4FE6', derivadas:'#E0517D', integral:'#1FB07E',
  atomo:'#1FA7C9', tabela:'#E68A2B', ligacoes:'#2B5CE6', geometria:'#1FB07E', polaridade:'#E0517D',
  conectivos:'#7A4FE6', verdade:'#2B5CE6', implicacao:'#E68A2B', argumentos:'#1FB07E',
};

function AbstractMark({ sym, s = 40, c }) {
  const col = c || SYM_COLOR[sym] || '#2B5CE6';
  const p = { fill: 'none', stroke: col, strokeWidth: 2.4, strokeLinecap: 'round', strokeLinejoin: 'round' };
  const F = { fill: col, stroke: 'none' };
  let body;
  switch (sym) {
    case 'sinais': body = <><path d="M10 20 H30" {...p}/><path d="M20 10 V30" {...p}/><circle cx="33" cy="28" r="3" {...F}/></>; break;
    case 'fracoes': body = <><path d="M10 20 H30" {...p}/><circle cx="14" cy="12" r="3.5" {...F}/><circle cx="26" cy="28" r="3.5" {...F}/></>; break;
    case 'potencias': body = <><text x="10" y="28" fontFamily="Georgia,serif" fontSize="24" fontWeight="700" fill={col}>x</text><text x="26" y="16" fontFamily="Georgia,serif" fontSize="14" fontWeight="700" fill={col}>2</text></>; break;
    case 'expressoes': body = <><text x="4" y="28" fontFamily="Georgia,serif" fontSize="22" fontWeight="700" fill={col}>a+b</text></>; break;
    case 'notaveis': body = <><path d="M6 30 L20 8 L34 30 Z" {...p}/><circle cx="20" cy="20" r="6" {...p}/></>; break;
    case 'fatoracao': body = <><path d="M14 6 C8 6 8 20 8 20 S8 34 14 34" {...p} strokeWidth="2.8"/><path d="M26 6 C32 6 32 20 32 20 S32 34 26 34" {...p} strokeWidth="2.8"/><circle cx="20" cy="20" r="2" {...F}/></>; break;
    case 'equacoes': body = <><path d="M8 15 H32 M8 25 H32" {...p} strokeWidth="2.6"/></>; break;
    case 'inequacoes': body = <><path d="M8 14 L28 20 L8 26" {...p} strokeWidth="2.6"/><path d="M32 30 L12 36" {...p} strokeWidth="2" opacity="0.5"/></>; break;
    case 'polinomiais': body = <><path d="M5 28 C 13 28, 13 12, 21 12 S 29 28, 35 18" {...p}/><path d="M5 32 H35" {...p} strokeWidth="1.5"/></>; break;
    case 'explog': body = <><path d="M6 30 C10 30 14 8 20 8 S30 16 35 14" {...p}/><path d="M6 8 V34" {...p} strokeWidth="1.5"/><path d="M6 34 H36" {...p} strokeWidth="1.5"/></>; break;
    case 'funcoes': body = <path d="M5 28 C 13 28, 13 12, 21 12 S 29 28, 35 18" {...p} />; break;
    case 'trig': body = <><path d="M8 30 L20 9 L32 30 Z" {...p} /><path d="M14.5 30 a7 7 0 0 1 11 0" {...p} /></>; break;
    case 'limites': body = <><circle cx="29" cy="20" r="3" {...F} /><path d="M6 12 H21 M6 20 H23 M6 28 H21" {...p} /></>; break;
    case 'derivadas': body = <><path d="M6 31 C14 31 16 10 25 10" {...p} /><path d="M13 31 L31 13" {...p} /></>; break;
    case 'integral': body = <><path d="M15 8 C11 8 11 14 11 20 S11 32 7 32" {...p} /><path d="M17 26 H31 M19 21 H31 M21 16 H31" {...p} strokeWidth="2" opacity="0.55" /></>; break;
    case 'geoanalit': body = <><path d="M4 20 H36 M20 4 V36" {...p} strokeWidth="1.5"/><circle cx="20" cy="20" r="11" {...p}/><path d="M9 31 L31 9" {...p}/></>; break;
    case 'atomo': body = <><circle cx="20" cy="20" r="2.4" {...F} /><ellipse cx="20" cy="20" rx="13" ry="6" {...p} /><ellipse cx="20" cy="20" rx="13" ry="6" {...p} transform="rotate(60 20 20)" /></>; break;
    case 'tabela': body = <><rect x="7" y="7" width="11" height="11" rx="1.6" {...p} /><rect x="22" y="7" width="11" height="11" rx="1.6" {...p} /><rect x="7" y="22" width="11" height="11" rx="1.6" {...p} /><rect x="22" y="22" width="11" height="11" rx="1.6" {...p} /></>; break;
    case 'ligacoes': body = <><circle cx="11" cy="20" r="5" {...p} /><circle cx="29" cy="20" r="5" {...p} /><path d="M16 20 H24" {...p} /></>; break;
    case 'geometria': body = <><circle cx="20" cy="11" r="3.4" {...F} /><circle cx="9" cy="29" r="3" {...F} /><circle cx="31" cy="29" r="3" {...F} /><path d="M20 11 L9 29 M20 11 L31 29" {...p} /></>; break;
    case 'polaridade': body = <><circle cx="20" cy="20" r="12" {...p} /><path d="M20 8 a12 12 0 0 1 0 24 Z" {...F} opacity="0.45" /></>; break;
    case 'conectivos': body = <><circle cx="15" cy="20" r="8" {...p} /><circle cx="25" cy="20" r="8" {...p} /></>; break;
    case 'verdade': body = <><rect x="8" y="8" width="24" height="24" rx="2.5" {...p} /><path d="M20 8 V32 M8 20 H32" {...p} /></>; break;
    case 'implicacao': body = <path d="M7 20 H30 M24 13 L32 20 L24 27" {...p} />; break;
    case 'argumentos': body = <><circle cx="11" cy="29" r="2.6" {...F} /><circle cx="20" cy="20" r="2.6" {...F} /><circle cx="29" cy="11" r="2.6" {...F} /></>; break;
    default: body = <circle cx="20" cy="20" r="10" {...p} />;
  }
  return <svg width={s} height={s} viewBox="0 0 40 40">{body}</svg>;
}

function Sym({ area, size = 40, color }) {
  return <AbstractMark sym={area} s={size} c={color} />;
}

// ═══════════════════════════════════════════════════
// 4. INFO DATA

const INFO = {
  sinais:{intro:'Conjuntos numéricos, a lógica dos sinais e a ordem em que as operações acontecem. Erros de sinal são a causa #1 de conta errada.',points:[['Conjuntos','N ⊂ Z ⊂ Q ⊂ R — cada conjunto inclui o anterior.'],['Jogo de sinais','(−) × (−) = (+); sinais iguais dão +, diferentes dão −.'],['Precedência','Parênteses → potência → × ÷ → + −, sempre da esquerda para a direita.']],examples:[['−3 × (−2) + 4 = ?','6 + 4 = 10.'],['2 + 3 × 4 = ?','2 + 12 = 14 (multiplica antes de somar).']]},
  fracoes:{intro:'Operar com frações sem medo e transitar entre fração, decimal e porcentagem.',points:[['Equivalência','Multiplicar ou dividir em cima e embaixo pelo mesmo número não muda a fração.'],['MMC','O menor número que é múltiplo de todos os denominadores.'],['Conversão','Fração ↔ decimal ↔ porcentagem são três formas de dizer a mesma coisa.']],examples:[['2/3 + 1/4 = ?','8/12 + 3/12 = 11/12.'],['0,75 como fração?','3/4.']]},
  potencias:{intro:'Expoentes, suas propriedades e a ponte entre potência e raiz.',points:[['Potência','aⁿ = a × a × … × a (n vezes).'],['Propriedades','Produto de mesma base: soma expoentes. Potência de potência: multiplica expoentes.'],['Radicais','ⁿ√a = a^(1/n). Radical é potência com expoente fracionário.']],examples:[['2³ × 2⁴ = ?','2⁷ = 128.'],['√50 simplificado?','5√2.']]},
  expressoes:{intro:'Anatomia de uma expressão algébrica e as manipulações elementares: termos, distributiva e frações com letras.',points:[['Termos semelhantes','Mesmo grupo de variáveis com mesmos expoentes — podem ser somados.'],['Distributiva','a(b + c) = ab + ac — distribuir é multiplicar cada parcela.'],['Frações algébricas','Funcionam como frações numéricas, mas com letras.']],examples:[['3x + 5x − 2x = ?','6x.'],['2(x + 3) = ?','2x + 6.']]},
  notaveis:{intro:'Os padrões de multiplicação que aparecem o tempo todo e poupam conta.',points:[['Quadrado da soma','(a + b)² = a² + 2ab + b².'],['Diferença de quadrados','a² − b² = (a + b)(a − b).'],['Cubo','(a + b)³ = a³ + 3a²b + 3ab² + b³.']],examples:[['(x + 3)² = ?','x² + 6x + 9.'],['x² − 25 = ?','(x + 5)(x − 5).']]},
  fatoracao:{intro:'O caminho inverso da expansão — transformar soma em produto para simplificar.',points:[['Fator comum','Colocar em evidência o que todos os termos compartilham.'],['Agrupamento','Agrupar termos em pares e fatorar cada grupo.'],['Trinômio','x² + Sx + P = (x + a)(x + b) onde a + b = S e ab = P.']],examples:[['6x² + 9x = ?','3x(2x + 3).'],['x² − 5x + 6 = ?','(x − 2)(x − 3).']]},
  equacoes:{intro:'Isolar a incógnita e resolver do 1º ao 2º grau por todos os caminhos.',points:[['1º grau','Isolar x usando operações inversas: ax + b = 0 → x = −b/a.'],['2º grau','Bhaskara: x = (−b ± √Δ) / 2a, onde Δ = b² − 4ac.'],['Completar quadrado','Reescrever na forma a(x + h)² + k para encontrar vértice e raízes.']],examples:[['3x − 7 = 8. Qual é x?','x = 5.'],['x² − 4x + 3 = 0?','x = 1 ou x = 3.']]},
  inequacoes:{intro:'Resolver desigualdades, estudar sinal e lidar com mais de uma equação.',points:[['Regra do sinal','Ao multiplicar por negativo, inverte-se a desigualdade.'],['Estudo de sinal','Raízes na reta e análise do sinal em cada intervalo.'],['Sistemas','Substituição ou adição para encontrar as incógnitas.']],examples:[['2x − 6 > 0?','x > 3.'],['x + y = 5 e x − y = 1?','x = 3, y = 2.']]},
  polinomiais:{intro:'As funções construídas a partir de potências de x: constante, afim, quadrática e além.',points:[['Afim','f(x) = ax + b — reta com inclinação a e corte em b.'],['Quadrática','f(x) = ax² + bx + c — parábola com vértice e eixo de simetria.'],['Modular','f(x) = |x| — gráfico em V, define-se por partes.']],examples:[['f(x) = 2x − 1. Qual é f(3)?','f(3) = 5.'],['Vértice de f(x) = x² − 4x + 3?','x_v = 2, y_v = −1.']]},
  explog:{intro:'Crescimento multiplicativo (exponencial) e sua operação inversa (logaritmo).',points:[['Exponencial','f(x) = aˣ — cresce se a > 1, decresce se 0 < a < 1.'],['Logaritmo','log_a(b) = c ⟺ aᶜ = b. É o expoente que falta.'],['Número e','e ≈ 2,718 — a base natural, onipresente em crescimento contínuo.']],examples:[['log₂(8) = ?','3, pois 2³ = 8.'],['Resolva 2ˣ = 16.','x = 4.']]},
  funcoes:{intro:'Uma função é uma regra que relaciona cada entrada (x) a um único resultado (y). Imagine uma máquina: você coloca um número, ela aplica a regra e devolve outro.',points:[['Notação f(x)','f(x) = 2x + 1 significa: pegue x, multiplique por 2 e some 1.'],['Domínio e imagem','Domínio são as entradas possíveis; imagem são as saídas obtidas.'],['Tipos comuns','Afim (reta), quadrática (parábola), exponencial, entre outras.']],examples:[['f(x) = 2x + 1. Quanto vale f(3)?','f(3) = 2·3 + 1 = 7.'],['Qual o domínio de f(x) = 1/x?','Todos os reais, menos 0 — não se divide por zero.'],['f(x) = x². Qual é a imagem?','y ≥ 0, pois todo quadrado é positivo ou zero.']]},
  trig:{intro:'A trigonometria estuda a relação entre ângulos e lados de triângulos. É a base de ondas, círculos e tudo que se repete.',points:[['Seno, cosseno, tangente','No triângulo retângulo: sen = oposto/hipotenusa, cos = adjacente/hipotenusa, tan = oposto/adjacente.'],['Círculo trigonométrico','Raio 1: o ângulo gira e define o cosseno (horizontal) e o seno (vertical).'],['Valores notáveis','sen 30° = 1/2, sen 45° = √2/2, sen 60° = √3/2.']],examples:[['Oposto 3, hipotenusa 5. Qual o seno?','sen = 3/5 = 0,6.'],['Quanto vale cos 60°?','cos 60° = 1/2 = 0,5.']]},
  algebra:{intro:'Álgebra usa letras no lugar de números desconhecidos, permitindo resolver equações e descrever padrões gerais.',points:[['Produtos notáveis','(a + b)² = a² + 2ab + b².'],['Fatoração','Reescrever como produto: x² − 9 = (x − 3)(x + 3).'],['Equação do 2º grau','ax² + bx + c = 0, resolvida por Bhaskara ou fatoração.']],examples:[['Resolva x² − 5x + 6 = 0.','Fatorando: (x − 2)(x − 3) = 0 → x = 2 ou x = 3.'],['Expanda (x + 4)².','x² + 8x + 16.']]},
  limites:{intro:'O limite mostra para qual valor uma função se aproxima quando x chega perto de um ponto. É o alicerce do cálculo.',points:[['Ideia intuitiva','Não importa o valor exato em x, e sim para onde a função tende ao redor dele.'],['Limites laterais','Aproximar pela esquerda (x→a⁻) e pela direita (x→a⁺).'],['Continuidade','A função é contínua se o limite existe e é igual ao valor no ponto.']],examples:[['lim (x→2) de 3x.','Basta substituir: 3·2 = 6.'],['lim (x→0) de sen(x)/x.','É igual a 1 — um limite fundamental.']]},
  derivadas:{intro:'A derivada mede a rapidez com que algo muda: é a inclinação da reta tangente à curva em cada ponto.',points:[['Regra da potência','d/dx [xⁿ] = n·xⁿ⁻¹.'],['Interpretação','A velocidade é a derivada da posição em relação ao tempo.'],['Regras básicas','A derivada da soma é a soma das derivadas; constantes saem multiplicando.']],examples:[['Derivada de f(x) = x³.',"f'(x) = 3x²."],['Derivada de f(x) = 5x² + 2x.',"f'(x) = 10x + 2."]]},
  integral:{intro:'A integral soma infinitas fatias para calcular áreas sob curvas. É a operação inversa da derivada.',points:[['Antiderivada','∫ xⁿ dx = xⁿ⁺¹/(n+1) + C.'],['Cálculo de área','A integral definida entre a e b dá a área sob a curva nesse intervalo.'],['Teorema fundamental','Liga derivada e integral: derivar desfaz integrar.']],examples:[['∫ 2x dx.','x² + C.'],['∫ 3 dx.','3x + C.']]},
  atomo:{intro:'O átomo é a menor parte da matéria que mantém as propriedades de um elemento. Tem um núcleo e elétrons ao redor.',points:[['Partículas','Prótons (+) e nêutrons no núcleo; elétrons (−) na eletrosfera.'],['Número atômico (Z)','É a quantidade de prótons e define qual é o elemento.'],['Distribuição eletrônica','Os elétrons ocupam camadas de energia (K, L, M…).']],examples:[['O carbono tem Z = 6. Quantos prótons?','6 prótons (e 6 elétrons, se neutro).'],['Onde ficam os elétrons?','Na eletrosfera, em camadas ao redor do núcleo.']]},
  tabela:{intro:'A tabela periódica organiza todos os elementos por número atômico e por propriedades parecidas.',points:[['Períodos e famílias','Linhas são períodos; colunas são famílias com propriedades semelhantes.'],['Metais e ametais','A maioria são metais (à esquerda); ametais ficam à direita.'],['Propriedades periódicas','Raio atômico e eletronegatividade variam de forma previsível.']],examples:[['O que elementos da mesma família têm em comum?','O mesmo número de elétrons na última camada.'],['A eletronegatividade cresce em qual sentido?','Da esquerda para a direita e de baixo para cima.']]},
  ligacoes:{intro:'Átomos se unem para ficar estáveis. Essas uniões são as ligações que mantêm as substâncias juntas.',points:[['Iônica','Transferência de elétrons entre metal e ametal (ex.: NaCl).'],['Covalente','Compartilhamento de elétrons entre ametais (ex.: H₂O).'],['Metálica','Elétrons livres entre metais — explica a condução elétrica.']],examples:[['Que ligação há no sal (NaCl)?','Iônica: o sódio doa um elétron ao cloro.'],['E na água (H₂O)?','Covalente: hidrogênio e oxigênio compartilham elétrons.']]},
  geometria:{intro:'A geometria molecular descreve o formato 3D das moléculas, definido pelos pares de elétrons ao redor do átomo central.',points:[['Teoria VSEPR','Pares de elétrons se repelem e se afastam o máximo possível.'],['Formatos comuns','Linear, angular, trigonal e tetraédrica.'],['Por que importa','A geometria define a polaridade e o comportamento da substância.']],examples:[['Qual a geometria da água (H₂O)?','Angular, por causa dos pares livres do oxigênio.'],['E a do CO₂?','Linear.']]},
  polaridade:{intro:'Polaridade indica como a carga elétrica se distribui na molécula — se existe um lado mais negativo e outro mais positivo.',points:[['Ligação polar','Surge quando os átomos têm eletronegatividades diferentes.'],['Polar x apolar','Depende da geometria e da soma dos vetores de polaridade.'],['Regra prática','Semelhante dissolve semelhante: polar dissolve polar.']],examples:[['A água é polar ou apolar?','Polar — formato angular, oxigênio mais negativo.'],['E o óleo?','Apolar — por isso não se mistura com água.']]},
  conectivos:{intro:'Conectivos lógicos unem proposições para formar novas, usando "e", "ou", "não", "se… então".',points:[['Negação (¬)','Inverte o valor: ¬V = F.'],['Conjunção (∧) "e"','Só é verdadeira se as duas forem verdadeiras.'],['Disjunção (∨) "ou"','É verdadeira se ao menos uma for verdadeira.']],examples:[['\"Choveu E fez sol\" é verdade se só choveu?','Não — a conjunção exige as duas verdadeiras.'],['\"Vou de ônibus OU a pé\", com só uma verdadeira?','Verdadeira — basta uma na disjunção.']]},
  verdade:{intro:'A tabela-verdade lista todas as combinações possíveis de uma proposição, mostrando quando ela é verdadeira ou falsa.',points:[['Construção','Para n proposições há 2ⁿ linhas de combinações.'],['Tautologia','É verdadeira em todas as linhas.'],['Contradição','É falsa em todas as linhas.']],examples:[['Quantas linhas para 2 proposições?','2² = 4 linhas.'],['\"p ∨ ¬p\" é o quê?','Uma tautologia — sempre verdadeira.']]},
  implicacao:{intro:'A implicação "se p então q" (p → q) só é falsa quando p é verdadeiro e q é falso.',points:[['Condicional','Em p → q, p é a condição e q a consequência.'],['Contrapositiva','p → q equivale a ¬q → ¬p.'],['Leis de De Morgan','¬(p ∧ q) = ¬p ∨ ¬q.']],examples:[['\"Se chover, levo guarda-chuva.\" Choveu e não levei?','Falso — é o único caso que torna a implicação falsa.'],['Contrapositiva de \"se estudo, passo\".','\"Se não passo, então não estudei.\"']]},
  sequencias:{intro:'Sequências são listas ordenadas de números seguindo uma lei de formação. PA e PG são os dois padrões fundamentais.',points:[['Progressão Aritmética (PA)','Cada termo difere do anterior pela razão r constante. Termo geral: aₙ = a₁ + (n−1)·r.'],['Progressão Geométrica (PG)','Cada termo é multiplicado pela razão q. Termo geral: aₙ = a₁ · qⁿ⁻¹.'],['Somas','Sₙ(PA) = n(a₁ + aₙ)/2. Sₙ(PG) = a₁(qⁿ − 1)/(q − 1) para q ≠ 1.']],examples:[['PA com a₁ = 3 e r = 4. Qual é a₆?','a₆ = 3 + 5·4 = 23.'],['PG: a₁ = 2, q = 3. Qual é a₄?','a₄ = 2·3³ = 54.']]},
  combinatoria:{intro:'Combinatória conta de quantas formas podemos organizar ou escolher elementos. Probabilidade mede a chance de um evento ocorrer.',points:[['Princípio fundamental da contagem','Se uma escolha A tem m formas e B tem n formas, juntas têm m·n formas.'],['Permutação e Combinação','Permutação importa a ordem; Combinação não. C(n,k) = n! / (k!(n−k)!).'],['Probabilidade clássica','P(A) = casos favoráveis / total de casos igualmente prováveis.']],examples:[['Quantos anagramas tem \"MAR\"?','P(3) = 3! = 6.'],['Escolher 2 de 5 pessoas. Quantas duplas?','C(5,2) = 10.']]},
  polinomios:{intro:'Polinômios são expressões da forma aₙxⁿ + … + a₁x + a₀.',points:[['Grau e coeficientes','O grau é o maior expoente. O coeficiente líder é o de grau máximo.'],['Divisão e Teorema do Resto','Ao dividir p(x) por (x − a), o resto é p(a).'],['Raízes e fatoração','r é raiz se p(r) = 0.']],examples:[['Qual o resto de x³ − 2x + 1 dividido por (x − 1)?','p(1) = 1 − 2 + 1 = 0; resto = 0.'],['Fatore x² − 5x + 6.','(x − 2)(x − 3); raízes 2 e 3.']]},
  complexos:{intro:'Números complexos estendem os reais adicionando a unidade imaginária i (i² = −1).',points:[['Forma algébrica','z = a + bi; a é a parte real, b a imaginária.'],['Módulo e conjugado','|z| = √(a² + b²). Conjugado: z̄ = a − bi.'],['Forma trigonométrica','z = |z|(cos θ + i sen θ).']],examples:[['(3 + 2i) + (1 − 5i) = ?','4 − 3i.'],['|2 + 2i| = ?','√(4 + 4) = 2√2.']]},
  matrizes:{intro:'Matrizes são tabelas de números que representam transformações lineares e sistemas de equações.',points:[['Operações','Soma e subtração elemento a elemento; multiplicação segue linha × coluna.'],['Determinante 2×2','det = ad − bc para [[a,b],[c,d]].'],['Matriz inversa e sistemas','A⁻¹ existe se det ≠ 0.']],examples:[['det de [[2,3],[1,4]]?','2·4 − 3·1 = 5.'],['Sistema: 2x+y=5, x+3y=10.','x=1, y=3.']]},
  geo3d:{intro:'A geometria espacial estuda figuras em três dimensões.',points:[['Poliedros de Euler','V − A + F = 2.'],['Prismas e cilindros','Volume = Área da base × altura.'],['Pirâmides, cones e esfera','Vol. pirâmide/cone = (1/3) Abase × h.']],examples:[['Cubo de aresta 3 cm. Qual o volume?','V = 3³ = 27 cm³.'],['Esfera r = 2. Qual o volume?','V = (4/3)π·8 ≈ 33,5 cm³.']]},
  aplicacoes:{intro:'O cálculo resolve problemas do mundo real: encontrar máximos e mínimos, calcular áreas irregulares.',points:[['Otimização','Iguale a derivada a zero para achar críticos.'],['Área entre curvas','∫ₐᵇ [f(x) − g(x)] dx.'],['Taxa de variação','A derivada modela velocidade, crescimento e qualquer taxa instantânea.']],examples:[['Máximo de f(x) = −x² + 4x.',"f'(x) = −2x + 4 = 0 → x = 2; f(2) = 4."],['Área de y = x² e y = x entre 0 e 1.','∫₀¹ (x − x²) dx = 1/6.']]},
  estatistica:{intro:'A estatística descritiva resume conjuntos de dados usando medidas numéricas e gráficos.',points:[['Medidas de tendência central','Média, mediana e moda.'],['Medidas de dispersão','Variância e desvio padrão.'],['Distribuições de frequência','Organizam dados em classes.']],examples:[['Média de {2, 4, 4, 6, 8, 10, 10}?','44/7 ≈ 6,3.'],['Mediana do mesmo conjunto?','6.']]},
  geoanalit:{intro:'Geometria analítica usa coordenadas para descrever figuras geométricas por equações algébricas.',points:[['Reta','Equação geral: ax + by + c = 0.'],['Circunferência','(x − a)² + (y − b)² = r².'],['Cônicas','Parábola, elipse e hipérbole.']],examples:[['Distância entre (1,2) e (4,6)?','√(9+16) = 5.'],['Equação da circunferência centro (2,−1), r=3?','(x−2)² + (y+1)² = 9.']]},
  logaritmos:{intro:'Logaritmos são o inverso da exponenciação: log_b(x) = y significa b^y = x.',points:[['Definição','log_b(x) = y ⟺ bʸ = x.'],['Propriedades','log do produto é a soma; log do quociente é a diferença.'],['Função logarítmica','f(x) = log_b(x) é a inversa de g(x) = bˣ.']],examples:[['log₂(8) = ?','3, pois 2³ = 8.'],['log(1000) = ?','3, pois 10³ = 1000.']]},
  argumentos:{intro:'Um argumento parte de premissas e chega a uma conclusão.',points:[['Validade','Importa a forma do raciocínio, não se as frases são reais.'],['Modus ponens','Se p → q e p são verdadeiros, então q.'],['Modus tollens','Se p → q e ¬q, então ¬p.']],examples:[['p → q e p verdadeiros. Qual a conclusão?','q (modus ponens).'],['\"Todo A é B; x é A.\" Logo?','x é B.']]},
};

function Expr({ val, style }) {
  const parts = [];
  let remaining = val, key = 0;
  const re = /\^(\d+)/;
  while (remaining.length) {
    const m = remaining.match(re);
    if (!m) { parts.push(<span key={key++}>{remaining}</span>); break; }
    parts.push(<span key={key++}>{remaining.slice(0, m.index)}</span>);
    parts.push(<sup key={key++} style={{ fontSize: '0.72em' }}>{m[1]}</sup>);
    remaining = remaining.slice(m.index + m[0].length);
  }
  return <span style={style}>{parts}</span>;
}

function norm(s) {
  return (s||'').replace(/\s+/g,'').replace(/[×∙]/g,'*').replace(/÷/g,'/').replace(/²/g,'^2').replace(/³/g,'^3').toLowerCase();
}

const KEYS = [
  ['x','^','√(','a/b','( )'],
  ['7','8','9','÷','π'],
  ['4','5','6','×','%'],
  ['1','2','3','−','^'],
  ['0','.','⌫','+','='],
];

function CalcKeypad({ val, onChange, onDone }) {
  const handleKey = (k) => {
    if (k==='⌫') { onChange(val.slice(0,-1)); return; }
    if (k==='=') { onDone(); return; }
    if (k==='a/b') { onChange(val+'/'); return; }
    if (k==='( )') { onChange(val+(val.slice(-1)==='(' ? ')' : '(')); return; }
    if (k==='π') { onChange(val+'π'); return; }
    onChange(val+k);
  };
  const keyStyle = (k) => ({
    flex: 1, height: 44, border: 'none', cursor: 'pointer', borderRadius: 9, fontFamily: 'Inter, sans-serif',
    fontSize: k.length > 1 ? 13 : 17, fontWeight: 600, transition: 'background .1s',
    background: ['÷','×','−','+','^'].includes(k) ? 'color-mix(in srgb, var(--accent) 18%, var(--surface))' : k==='=' ? 'var(--accent)' : k==='⌫' ? 'var(--surface-2)' : 'var(--surface)',
    color: k==='=' ? '#fff' : 'var(--text)',
  });
  return (
    <div style={{ position: 'absolute', bottom: 0, left: 0, right: 0, zIndex: 20, background: 'var(--bg)', borderTop: '1px solid var(--border)', padding: '10px 12px 18px' }}>
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 8 }}>
        <span style={{ fontFamily: 'Inter', fontSize: 12, fontWeight: 600, letterSpacing: '0.06em', textTransform: 'uppercase', color: 'var(--text-muted)' }}>Calculadora</span>
        <button onClick={onDone} style={{ background: 'none', border: 'none', cursor: 'pointer', color: 'var(--accent)', fontFamily: 'Inter', fontSize: 13.5, fontWeight: 700, padding: 0 }}>Pronto ✓</button>
      </div>
      <div style={{ display: 'flex', flexDirection: 'column', gap: 7 }}>
        {KEYS.map((row, i) => (
          <div key={i} style={{ display: 'flex', gap: 7 }}>
            {row.map((k) => <button key={k} onClick={() => handleKey(k)} style={keyStyle(k)}>{k}</button>)}
          </div>
        ))}
      </div>
    </div>
  );
}

function QuizView({ subject, meta, onClose, onNext }) {
  const d = QUESTIONS[subject];
  const m = meta || {};
  const chipLabel = m.random ? 'Aleatória' : (m.label || d.tag);
  const eyebrow = m.random ? `${d.tag} · Aleatória` : (m.label ? `${m.parent || d.eyebrow.split(' · ')[0]} · ${m.label}` : d.eyebrow);

  const [typedVal, setTypedVal] = useState('');
  const [showKeypad, setShowKeypad] = useState(false);
  const [wrongCount, setWrongCount] = useState(0);
  const [status, setStatus] = useState('idle');
  const [pickedAlt, setPickedAlt] = useState(null);
  const [showMenu, setShowMenu] = useState(false);
  const correctIdx = d.options.findIndex((o) => o.correct);
  const showHint = wrongCount >= 1;
  const showAlts = !d.typed || wrongCount >= 2;

  const submitTyped = () => {
    if (!typedVal.trim()) return;
    setShowKeypad(false);
    if (norm(typedVal) === norm(d.answer)) {
      setStatus('correct');
    } else {
      setWrongCount((c) => c + 1);
      setStatus('wrong');
      setTimeout(() => setStatus('idle'), 900);
    }
  };

  const pickAlt = (i) => {
    if (status === 'correct') return;
    setPickedAlt(i);
    if (i === correctIdx) { setStatus('correct'); }
    else { setWrongCount((c) => c + 1); setStatus('wrong'); setTimeout(() => { setStatus('idle'); setPickedAlt(null); }, 900); }
  };

  const correct = status === 'correct';

  return (
    <div style={{ display: 'flex', flexDirection: 'column', height: '100%', position: 'relative' }}>
      <div style={{ flex: '0 0 auto', padding: '8px 18px 0' }}>
        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 12 }}>
          <button onClick={onClose} style={{ background: 'none', border: 'none', cursor: 'pointer', color: 'var(--text-muted)', fontSize: 22, lineHeight: 1, padding: 0 }}>✕</button>
          <Chip bg={d.pastel} color="#16160f">{chipLabel}</Chip>
          <span style={{ fontFamily: 'Inter', fontSize: 13, fontWeight: 600, color: 'var(--text-muted)' }}>Questão {d.current} de {d.total}</span>
        </div>
        <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: 12 }}>
          <div style={{ flex: 1 }}><ProgressBar value={Math.round((d.current/d.total)*100)} color="var(--accent)" track="var(--surface-2)" h={6} /></div>
          <span style={{ display: 'inline-flex', alignItems: 'center', gap: 3, color: 'var(--accent-soft)', fontFamily: 'Inter', fontSize: 12, fontWeight: 700 }}><Ic.bolt s={14} />+{d.value} XP</span>
        </div>
        <div style={{ display: 'flex', alignItems: 'center', gap: 8, padding: '8px 12px', borderRadius: 10, background: 'var(--surface)', border: '1px solid var(--border)', marginBottom: 4 }}>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--text-muted)" strokeWidth="1.8" strokeLinecap="round"><circle cx="12" cy="12" r="9"/><path d="M12 11v5"/><circle cx="12" cy="7.6" r="0.6" fill="var(--text-muted)" stroke="none"/></svg>
          <span style={{ fontFamily: 'Inter', fontSize: 12.5, fontWeight: 500, color: 'var(--text-muted)' }}>{d.instr}</span>
        </div>
      </div>

      <div className="py-scroll" style={{ flex: '1 1 auto', minHeight: 0, overflowY: showKeypad ? 'hidden' : 'auto', padding: '12px 18px 0' }}>
        <div style={{ position: 'relative', overflow: 'hidden', background: 'var(--surface)', border: '1px solid var(--border)', borderRadius: 18, padding: '22px 20px', marginBottom: 16 }}>
          <span style={{ position: 'absolute', right: -10, bottom: -36, fontFamily: 'Georgia, serif', fontSize: 130, lineHeight: 1, color: d.pastel, opacity: 0.1, userSelect: 'none', pointerEvents: 'none' }}>{d.sym}</span>
          <div style={{ position: 'relative', fontFamily: 'Inter', fontSize: 11, fontWeight: 600, letterSpacing: '0.08em', textTransform: 'uppercase', color: 'var(--text-muted)', marginBottom: 10 }}>{eyebrow}</div>
          <div style={{ position: 'relative', fontFamily: 'var(--font-display)', fontWeight: 600, fontSize: 24, lineHeight: 1.25, color: 'var(--text)' }}>{d.question}</div>
        </div>

        {d.typed && !correct && (
          <button onClick={() => setShowKeypad(true)} style={{
            display: 'flex', alignItems: 'center', gap: 12, width: '100%', textAlign: 'left',
            padding: '14px 16px', borderRadius: 14, border: `2px solid ${status==='wrong' ? '#e84949' : showKeypad ? 'var(--accent)' : 'var(--border)'}`,
            background: 'var(--surface)', cursor: 'pointer', marginBottom: 12, transition: 'border-color .15s',
          }}>
            {typedVal
              ? <Expr val={typedVal} style={{ flex: 1, fontFamily: 'Georgia, serif', fontSize: 20, fontWeight: 600, color: status==='wrong' ? '#e84949' : 'var(--text)' }} />

          </button>
        )}

        {d.typed && correct && typedVal && (
          <div style={{ display: 'flex', alignItems: 'center', gap: 10, padding: '12px 16px', borderRadius: 14, background: 'rgba(78,203,113,0.14)', border: '1.5px solid #4ecb71', marginBottom: 12 }}>
            <Ic.check s={20} /><Expr val={typedVal} style={{ fontFamily: 'Georgia, serif', fontSize: 19, fontWeight: 600, color: '#4ecb71' }} />
          </div>
        )}

        {showHint && !correct && <HintCard text={d.hint} />}

        {(showAlts || (d.typed && wrongCount >= 2)) && (
          <div style={{ display: 'flex', flexDirection: 'column', gap: 10, marginTop: 14 }}>
            {!d.typed && <div style={{ fontFamily: 'Inter', fontSize: 12, fontWeight: 600, letterSpacing: '0.06em', textTransform: 'uppercase', color: 'var(--text-muted)', marginBottom: 2 }}>Escolha a alternativa</div>}
            {d.typed && wrongCount >= 2 && <div style={{ fontFamily: 'Inter', fontSize: 12, fontWeight: 600, letterSpacing: '0.06em', textTransform: 'uppercase', color: 'var(--text-muted)', marginBottom: 2 }}>Ou escolha uma alternativa</div>}
            {d.options.map((o, i) => {
              const isCorrect = i === correctIdx;
              const isWrong = pickedAlt === i && !isCorrect;
              const showRight = correct && isCorrect;
              const bg = showRight ? 'rgba(78,203,113,0.14)' : isWrong ? 'rgba(232,73,73,0.12)' : 'var(--surface)';
              const bd = showRight ? '1.5px solid #4ecb71' : isWrong ? '1.5px solid #e84949' : '1.5px solid var(--border)';
              const badgeBg = showRight ? '#4ecb71' : isWrong ? '#e84949' : 'var(--surface-2)';
              const badgeC = showRight ? '#0c2a16' : isWrong ? '#2a0c0c' : 'var(--text-muted)';
              return (
                <button key={i} onClick={() => pickAlt(i)} disabled={correct} style={{ display: 'flex', alignItems: 'center', gap: 13, padding: '13px 15px', borderRadius: 13, background: bg, border: bd, cursor: correct ? 'default' : 'pointer', textAlign: 'left', transition: 'background .15s' }}>

                </button>
              );
            })}
          </div>
        )}
        <div style={{ height: showKeypad ? 310 : 80 }} />

          <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><circle cx="5" cy="6" r="0.5"/><circle cx="5" cy="12" r="0.5"/><circle cx="5" cy="18" r="0.5"/><path d="M10 6h9M10 12h9M10 18h9"/></svg>
        </button>
        {d.typed && !correct && !showKeypad && (
          <button onClick={submitTyped} disabled={!typedVal.trim()} style={{ flex: 1, height: 54, border: 'none', cursor: typedVal.trim() ? 'pointer' : 'default', borderRadius: 999, background: typedVal.trim() ? 'var(--accent)' : 'var(--surface-2)', color: typedVal.trim() ? '#fff' : 'var(--text-muted)', fontFamily: 'Inter', fontSize: 16, fontWeight: 600, transition: 'background .2s' }}>Responder</button>
        )}
        {(!d.typed || correct) && (
          <button onClick={onNext} style={{ flex: 1, height: 54, border: 'none', cursor: 'pointer', borderRadius: 999, background: correct ? 'var(--accent)' : 'var(--surface-2)', color: correct ? '#fff' : 'var(--text-muted)', fontFamily: 'Inter', fontSize: 16, fontWeight: 600, boxShadow: correct ? '0 10px 26px -10px color-mix(in srgb,var(--accent) 70%,transparent)' : 'none', transition: 'background .2s' }}>Próxima questão</button>
        )}
      </div>

      {showKeypad && <CalcKeypad val={typedVal} onChange={setTypedVal} onDone={() => setShowKeypad(false)} />}
      {showMenu && <QuestionMenu d={d} onClose={() => setShowMenu(false)} />}
    </div>
  );
}

  return {
    '--accent':'#1E40FF',
    '--accent-soft': dark ? 'color-mix(in srgb, #1E40FF 52%, #ffffff)' : '#1E40FF',
    '--font-display': "'Playfair Display', Georgia, serif",
    '--radius':'24px',
    '--pastel-mat':'#A8C5F5','--pastel-qui':'#A8E6CF','--pastel-log':'#C9B8F5',
    ...themed,
  };
}

function App() {
  const [route, setRoute] = useState('login');
  const [subject, setSubject] = useState('mat');
  const [subId, setSubId] = useState(null);
  const [meta, setMeta] = useState(null);
  const [dark, setDark] = useState(true);
  const [sidebarOpen, setSidebarOpen] = useState(true);

  useEffect(() => { localStorage.setItem('pythos_route', route); }, [route]);

  const subjData = CURRICULUM[subject];
  const subData = subjData && subId
    ? subjData.sections.flatMap((s) => s.subs).find((x) => x.id === subId)
    : null;

  const isLogin = route === 'login';
  const isQuiz = route === 'question';
  const showNav = !isLogin;
  const activeNav = ['home','progress','settings'].includes(route) ? route : 'home';

  let screen;
  if (route === 'login') {
    screen = <LoginScreen onEnter={() => setRoute('home')} />;
  } else if (route === 'home') {
    screen = <HomeView onOpen={(s) => { setSubject(s); setRoute('detail'); }} onProfile={() => setRoute('profile')} />;
  } else if (route === 'detail') {
    screen = <DetailView subject={subject} onBack={() => setRoute('home')} onOpenSubtopic={(id) => { setSubId(id); setRoute('subtopic'); }} />;
  } else if (route === 'subtopic' && subData) {
    screen = <SubtopicView subject={subject} sub={subData} pastel={subjData.pastel}
      onBack={() => setRoute('detail')}
      onRandom={() => { setMeta({ random: true, parent: subData.parent }); setRoute('question'); }}
      onOpenLesson={(l) => { setMeta({ label: l.title, parent: subData.parent }); setRoute('question'); }} />;
  } else if (route === 'question') {
    screen = <QuizView subject={subject} meta={meta} onClose={() => setRoute(subData ? 'subtopic' : 'detail')} onNext={() => setRoute(subData ? 'subtopic' : 'detail')} />;
  } else if (route === 'profile') {
    screen = <ProfileView onBack={() => setRoute('home')} onLogout={() => setRoute('login')} />;
  } else if (route === 'progress') {
    screen = <ProgressView />;
  } else if (route === 'settings') {
    screen = <SettingsView dark={dark} onToggleDark={() => setDark((v) => !v)} onLogout={() => setRoute('login')} />;
  } else {
    screen = <HomeView onOpen={(s) => { setSubject(s); setRoute('detail'); }} onProfile={() => setRoute('profile')} />;
  }

  const tokens = appTokens(dark);

  if (isLogin) {
    return (
      <div style={{ ...tokens, width: '100%', minHeight: '100vh' }}>
        {screen}
      </div>
    );
  }

  return (
    <div style={{ ...tokens, height: '100vh', width: '100%', display: 'flex', background: 'var(--bg)', overflow: 'hidden' }}>
      {/* Desktop sidebar */}
      <div className="desktop-only" style={{
        flex: `0 0 ${sidebarOpen ? 260 : 64}px`,
        transition: 'flex-basis .25s cubic-bezier(.4,0,.2,1)',
      }}>
        <Sidebar
          active={activeNav}
          onNav={(id) => { setSubId(null); setMeta(null); setRoute(id); }}
          dark={dark}
          onToggleDark={() => setDark((v) => !v)}
          onProfile={() => setRoute('profile')}
          onLogout={() => setRoute('login')}
          open={sidebarOpen}
          onToggle={() => setSidebarOpen((v) => !v)}
        />
      </div>

      {/* Main content */}
      <div style={{
        flex: 1, minWidth: 0, display: 'flex', flexDirection: 'column',
        height: '100vh', overflow: 'hidden',
      }}>
        <div className="py-scroll" style={{
          flex: 1, minHeight: 0, overflowY: 'auto',
          display: 'flex', justifyContent: 'center',
        }}>
          <div style={{ width: '100%', maxWidth: 720 }}>
            {screen}
          </div>
        </div>

        {/* Mobile bottom nav */}
        {showNav && <MobileBottomNav active={activeNav} onNav={(id) => { setSubId(null); setMeta(null); setRoute(id); }} />}
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════
// 17. RENDER
// ═══════════════════════════════════════════════════
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
